<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>IELTSmindset — Подготовка к IELTS</title>
<meta name="description" content="Подготовка к IELTS: чтение и аудирование в формате настоящего экзамена." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css?v=1" />
</head>
<body>

<header class="topbar" id="topbar">
  <button class="brand" id="brandBtn" aria-label="На главную">
    <span class="brand-mark">IM</span>
    <span class="brand-name">IELTSmindset</span>
  </button>
  <nav class="topnav" id="topnav">
    <button class="nav-link active" data-nav="dashboard">Главная</button>
    <button class="nav-link" data-nav="reading">Чтение</button>
    <button class="nav-link" data-nav="listening">Аудирование</button>
  </nav>
  <div class="topbar-right">
    <div class="timer-chip hidden" id="timerChip">
      <span class="timer-icon">⏱</span>
      <span id="timerText">60:00</span>
    </div>
    <button class="icon-btn" id="soundToggle" aria-label="Звук" title="Звук">🔊</button>
  </div>
</header>

<main id="screen" class="screen" aria-live="polite"></main>

<div class="modal-backdrop hidden" id="exitConfirmBackdrop">
  <div class="modal-box">
    <h3>Выйти из теста?</h3>
    <p>Ваш прогресс в этой попытке не будет сохранён. Тестовый режим лучше проходить без перерывов, как на настоящем экзамене.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="exitConfirmCancel">Остаться</button>
      <button class="btn btn-danger" id="exitConfirmLeave">Выйти</button>
    </div>
  </div>
</div>

<script src="app.js?v=1"></script>
</body>
</html>
